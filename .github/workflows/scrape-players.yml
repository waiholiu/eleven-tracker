name: Scrape Eleven VR Online Players

on:
  schedule:
    - cron: "*/15 * * * *"  # Every 15 minutes
  workflow_dispatch: {}      # Allow manual triggers

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape and record player data
        run: python scrape.py

      - name: Commit updated spreadsheet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/players.xlsx
          git diff --cached --quiet || git commit -m "Update player data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
