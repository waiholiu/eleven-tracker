<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eleven VR Player Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent2: #f78166;
      --green: #3fb950;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 600;
    }

    header h1 span { color: var(--accent); }

    .stats-bar {
      display: flex;
      gap: 2rem;
      margin-left: auto;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .stats-bar .value {
      color: var(--text);
      font-weight: 600;
      font-size: 1.1rem;
    }

    .controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.8rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .controls label {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .controls select {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.6rem;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .controls select:focus {
      outline: none;
      border-color: var(--accent);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.2rem 1.5rem;
    }

    .chart-card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.8rem;
      color: var(--text-muted);
    }

    .chart-card h2 span { color: var(--accent); }

    .chart-container {
      position: relative;
      height: 350px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 700px) {
      header, .controls, main { padding-left: 1rem; padding-right: 1rem; }
      .stats-bar { gap: 1rem; }
      .chart-container { height: 260px; }
    }
  </style>
</head>
<body>

<header>
  <h1>🏓 <span>Eleven VR</span> Player Tracker</h1>
  <div class="stats-bar">
    <div>Latest count: <span class="value" id="latest-total">—</span></div>
    <div>Countries: <span class="value" id="latest-countries">—</span></div>
    <div>Data points: <span class="value" id="data-points">—</span></div>
  </div>
</header>

<div class="controls">
  <label for="country-filter">Country:</label>
  <select id="country-filter">
    <option value="__total__">All Countries (Total)</option>
  </select>
</div>

<main>
  <div class="chart-card">
    <h2>📈 Players Online <span>Over Time</span></h2>
    <div class="chart-container">
      <canvas id="timeline-chart"></canvas>
    </div>
  </div>

  <div class="chart-card">
    <h2>🕐 Average Players by <span>Time of Day</span> (UTC)</h2>
    <div class="chart-container">
      <canvas id="hourly-chart"></canvas>
    </div>
  </div>

  <div class="chart-card">
    <h2>🌍 Top Countries <span>Right Now</span></h2>
    <div class="chart-container">
      <canvas id="countries-chart"></canvas>
    </div>
  </div>
</main>

<footer>
  Data scraped every 30 minutes from
  <a href="https://11clubhouse.com/eleven-online-players.html" target="_blank">11clubhouse.com</a>
  · <a href="https://github.com/waiholiu/eleven-tracker" target="_blank">GitHub repo</a>
</footer>

<script>
const CHART_COLORS = [
  '#58a6ff','#f78166','#3fb950','#d2a8ff','#f0883e',
  '#a5d6ff','#ffa657','#7ee787','#d4a5ff','#ffc68a'
];

const chartDefaults = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: {
    legend: { display: false },
    tooltip: {
      backgroundColor: '#161b22',
      borderColor: '#30363d',
      borderWidth: 1,
      titleColor: '#e6edf3',
      bodyColor: '#8b949e',
      cornerRadius: 6,
      padding: 10,
    },
  },
  scales: {
    x: {
      grid: { color: '#21262d' },
      ticks: { color: '#8b949e', maxTicksLimit: 12 },
    },
    y: {
      grid: { color: '#21262d' },
      ticks: { color: '#8b949e' },
      beginAtZero: true,
    },
  },
};

let rawData = null;
let timelineChart, hourlyChart, countriesChart;

async function loadData() {
  const resp = await fetch('players.json');
  rawData = await resp.json();
  populateFilter();
  updateStats();
  renderAll();
}

function populateFilter() {
  const select = document.getElementById('country-filter');
  for (const c of rawData.countries) {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    select.appendChild(opt);
  }
  select.addEventListener('change', renderAll);
}

function updateStats() {
  const last = rawData.data[rawData.data.length - 1];
  document.getElementById('latest-total').textContent = last.total;
  document.getElementById('latest-countries').textContent = Object.keys(last.countries).length;
  document.getElementById('data-points').textContent = rawData.data.length;
}

function getSelectedValues() {
  const filter = document.getElementById('country-filter').value;
  return rawData.data.map(d => ({
    timestamp: d.timestamp,
    value: filter === '__total__' ? d.total : (d.countries[filter] || 0),
  }));
}

function renderAll() {
  renderTimeline();
  renderHourly();
  renderCountries();
}

function renderTimeline() {
  const values = getSelectedValues();
  const labels = values.map(v => new Date(v.timestamp.replace(' UTC', 'Z')));
  const data = values.map(v => v.value);
  const filter = document.getElementById('country-filter').value;
  const label = filter === '__total__' ? 'Total Players' : filter;

  if (timelineChart) timelineChart.destroy();
  timelineChart = new Chart(document.getElementById('timeline-chart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label,
        data,
        borderColor: CHART_COLORS[0],
        backgroundColor: CHART_COLORS[0] + '20',
        fill: true,
        tension: 0.3,
        pointRadius: data.length > 100 ? 0 : 3,
        pointHoverRadius: 5,
        borderWidth: 2,
      }],
    },
    options: {
      ...chartDefaults,
      scales: {
        ...chartDefaults.scales,
        x: {
          ...chartDefaults.scales.x,
          type: 'time',
          time: { tooltipFormat: 'MMM d, HH:mm', },
        },
      },
    },
  });
}

function renderHourly() {
  const values = getSelectedValues();
  const hourBuckets = Array.from({ length: 24 }, () => []);

  for (const v of values) {
    const hour = new Date(v.timestamp.replace(' UTC', 'Z')).getUTCHours();
    hourBuckets[hour].push(v.value);
  }

  const avgByHour = hourBuckets.map(bucket =>
    bucket.length ? Math.round(bucket.reduce((a, b) => a + b, 0) / bucket.length) : 0
  );

  const labels = Array.from({ length: 24 }, (_, i) => `${String(i).padStart(2, '0')}:00`);
  const filter = document.getElementById('country-filter').value;
  const label = filter === '__total__' ? 'Avg Total Players' : `Avg ${filter} Players`;

  if (hourlyChart) hourlyChart.destroy();
  hourlyChart = new Chart(document.getElementById('hourly-chart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label,
        data: avgByHour,
        backgroundColor: CHART_COLORS[2] + '80',
        borderColor: CHART_COLORS[2],
        borderWidth: 1,
        borderRadius: 4,
      }],
    },
    options: chartDefaults,
  });
}

function renderCountries() {
  const last = rawData.data[rawData.data.length - 1];
  const sorted = Object.entries(last.countries)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 15);

  const labels = sorted.map(([c]) => c);
  const data = sorted.map(([, v]) => v);

  if (countriesChart) countriesChart.destroy();
  countriesChart = new Chart(document.getElementById('countries-chart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Players Online',
        data,
        backgroundColor: CHART_COLORS.concat(CHART_COLORS).slice(0, data.length).map(c => c + '99'),
        borderColor: CHART_COLORS.concat(CHART_COLORS).slice(0, data.length),
        borderWidth: 1,
        borderRadius: 4,
      }],
    },
    options: {
      ...chartDefaults,
      indexAxis: 'y',
      scales: {
        x: { ...chartDefaults.scales.x, beginAtZero: true },
        y: { ...chartDefaults.scales.y, grid: { display: false } },
      },
    },
  });
}

loadData();
</script>
</body>
</html>
